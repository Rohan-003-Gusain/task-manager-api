<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Status</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="bg"></div>
<div class="container">

<h2>Update Task Status</h2>

<div class="input-group">
<input id="title" placeholder="Task Title" disabled>
</div>

<div class="input-group">
<input id="description" placeholder="Description" disabled>
</div>

<div class="dropdown">

<div class="dropdown-btn" onclick="toggleDropdown()">
<span id="selectedStatus">PENDING</span> ▼
</div>

<div class="dropdown-list" id="dropdownList">
    <div class="dropdown-item pending" onclick="selectStatus('PENDING')">PENDING</div>
    <div class="dropdown-item progress" onclick="selectStatus('IN_PROGRESS')">IN_PROGRESS</div>
    <div class="dropdown-item done" onclick="selectStatus('DONE')">DONE</div>
  </div>

</div>

<button onclick="updateStatus()">Update Status</button>

</div>

<script src="../js/auth.js"></script>
<script src="user-js/user-update-status.js"></script>

</body>
</html>
