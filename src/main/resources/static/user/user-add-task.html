<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Add Task</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>
<div class="bg"></div>
<div class="container">

<h2><i class="fa fa-plus"></i> Add New Task</h2>

<div class="input-group">
<input id="title" placeholder="Task Title">
</div>

<div class="input-group">
<input id="description" placeholder="Description">
</div>

<div class="dropdown">
  <div class="dropdown-btn" onclick="toggleDropdown()">
    <span id="selectedStatus">PENDING</span> ▼
  </div>

  <div class="dropdown-list" id="dropdownList">
    <div class="dropdown-item pending" onclick="selectStatus('PENDING')">PENDING</div>
    <div class="dropdown-item progress" onclick="selectStatus('IN_PROGRESS')">IN_PROGRESS</div>
    <div class="dropdown-item done" onclick="selectStatus('DONE')">DONE</div>
  </div>
</div>

<button onclick="saveTask()">
<i class="fa fa-save"></i> Save Task
</button>

<button onclick="goBack()" class="logout-btn">
	<i class="fa fa-home"></i> Dashboard
</button>

</div>

<script src="../js/auth.js"></script>
<script src="user-js/user-add-task.js"></script>

</body>
</html>
